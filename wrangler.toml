# Cloudflare Pages + Functions config for the namkha site.
# The static site is built to dist/ (vite build) and the API lives in functions/.
name = "namkhatashioedzer"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"

# D1 database binding — the guestbook store.
# Create it once with:  wrangler d1 create namkha-guestbook
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "namkha-guestbook"
database_id = "5bfe8330-a8bc-4bcf-9e61-84e52718d96d"
